<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Startup Blog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f172a;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  z-index:1000;
}

header h1{
  color:#22c55e;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:#fff;
}

nav a:hover{
  color:#22c55e;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{
  font-size:3rem;
  margin-bottom:20px;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:#22c55e;
  border:none;
  border-radius:30px;
  color:#000;
  cursor:pointer;
}

/* BLOGS */
.blogs{
  padding:100px 50px;
}

.blog-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card p{
  opacity:0.7;
  margin:10px 0;
}

/* POPUPS */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  transition:0.3s;
  width:90%;
  max-width:600px;
  max-height:80vh;
  overflow-y:auto;
}

.popup.active{
  transform:translate(-50%,-50%) scale(1);
}

/* BLOG CONTENT STYLING */
#blogContent h2{margin-bottom:10px;}
#blogContent h3{margin-top:15px;color:#22c55e;}
#blogContent p{opacity:0.85;line-height:1.6;}
#blogContent ul{padding-left:20px;margin:10px 0;}

footer{
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <h1>MyStartup</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#blogs">Blogs</a>
  </nav>
</header>

<section class="hero">
  <h2>Building the Future 🚀</h2>
  <p>Follow my startup journey</p>
  <button class="btn" onclick="openSubscribe()">Subscribe</button>
</section>

<section class="blogs" id="blogs">
  <h2>Latest Blogs</h2>
  <div class="blog-container" id="blogContainer"></div>
</section>

<!-- Subscribe Popup -->
<div class="popup" id="subscribePopup">
  <h3>Subscribe</h3>
  <input type="email" placeholder="Enter email" style="padding:10px;width:100%;margin:10px 0;border-radius:10px;border:none;">
  <button class="btn" onclick="closeSubscribe()">Close</button>
</div>

<!-- Blog Popup -->
<div class="popup" id="blogPopup">
  <div id="blogContent"></div>
  <button class="btn" onclick="closeBlog()">Close</button>
</div>

<footer>
  <p>© 2026 MyStartup</p>
</footer>

<script>

const blogs = [
{
title: "My Research Journey in Regenerative Medicine",
preview: "Exploring how AI, stem cells, and data science are shaping the future of healing...",
content: `
<h2>🧬 My Journey into Regenerative Medicine</h2>

<p>Regenerative medicine is about restoring and rebuilding damaged tissues instead of just treating symptoms.</p>

<h3>🌱 What is it?</h3>
<ul>
<li>Stem Cell Therapy</li>
<li>Tissue Engineering</li>
<li>Gene Editing</li>
</ul>

<h3>🔬 My Research</h3>
<p>I explored machine learning for predicting tissue regeneration outcomes and applied spectral data techniques.</p>

<h3>🧠 Key Insights</h3>
<ul>
<li>Data is critical</li>
<li>Personalized treatment is future</li>
<li>AI + healthcare = transformation</li>
</ul>

<h3>🚀 Future</h3>
<p>Healthcare will move towards prediction, regeneration, and personalization.</p>

<h3>✍️ Final Thought</h3>
<p>The future of healthcare will rebuild life itself.</p>
`
}
];

const container = document.getElementById("blogContainer");

function loadBlogs(){
  blogs.forEach((blog, index) => {
    const card = document.createElement("div");
    card.classList.add("card");
    card.innerHTML = `
      <h3>${blog.title}</h3>
      <p>${blog.preview}</p>
      <button class="btn" onclick="openBlog(${index})">Read More</button>
    `;
    container.appendChild(card);
  });
}

function openBlog(index){
  document.getElementById("blogContent").innerHTML = blogs[index].content;
  document.getElementById("blogPopup").classList.add("active");
}

function closeBlog(){
  document.getElementById("blogPopup").classList.remove("active");
}

function openSubscribe(){
  document.getElementById("subscribePopup").classList.add("active");
}

function closeSubscribe(){
  document.getElementById("subscribePopup").classList.remove("active");
}

window.onload = loadBlogs;

</script>

</body>
</html>
