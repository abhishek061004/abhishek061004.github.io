<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Startup Blog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f172a;
  color:#fff;
  overflow-x:hidden;
}

header{
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  z-index:1000;
}

header h1{
  color:#22c55e;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

nav a:hover{
  color:#22c55e;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#0f172a,#020617);
}

.hero h2{
  font-size:3rem;
  margin-bottom:20px;
}

.hero p{
  opacity:0.7;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:#22c55e;
  border:none;
  border-radius:30px;
  color:#000;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

.blogs{
  padding:100px 50px;
}

.blog-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card h3{
  margin-bottom:10px;
}

footer{
  text-align:center;
  padding:20px;
  background:#020617;
}

.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  transition:0.3s;
}

.popup.active{
  transform:translate(-50%,-50%) scale(1);
}

</style>
</head>

<body>

<header>
  <h1>MyStartup</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#blogs">Blogs</a>
    <a href="#">About</a>
  </nav>
</header>

<section class="hero">
  <h2>Building the Future 🚀</h2>
  <p>Follow my startup journey, ideas, failures & success</p>
  <button class="btn" onclick="openPopup()">Subscribe</button>
</section>

<section class="blogs" id="blogs">
  <h2>Latest Blogs</h2>
  <div class="blog-container" id="blogContainer"></div>
</section>

<div class="popup" id="popup">
  <h3>Subscribe to updates</h3>
  <input type="email" placeholder="Enter email" style="padding:10px;width:100%;margin:10px 0;border-radius:10px;border:none;">
  <button class="btn" onclick="closePopup()">Close</button>
</div>

<footer>
  <p>© 2026 MyStartup | Built with ❤️</p>
</footer>

<script>

const blogs = [

{
title: "My Research Journey in Regenerative Medicine",
content: "<h2>🧬 My Journey into Regenerative Medicine</h2>\
<p>Regenerative medicine isn’t just another field of study—it’s a shift in how we think about healing itself. Instead of managing symptoms or slowing disease progression, the goal is simple but powerful: <b>restore, replace, or regenerate damaged tissues and organs</b>.</p>\

<h3>🌱 What is Regenerative Medicine?</h3>\
<p>Regenerative medicine combines biology, engineering, and data science to repair or replace damaged cells and tissues.</p>\
<ul>\
<li><b>Stem Cell Therapy</b> – regenerating tissues using undifferentiated cells</li>\
<li><b>Tissue Engineering</b> – creating biological substitutes using scaffolds</li>\
<li><b>Gene Editing</b> – modifying DNA to correct defects</li>\
</ul>\

<h3>🔬 My Research Focus</h3>\

<h4>1. Predicting Tissue Regeneration Outcomes</h4>\
<p>I explored how machine learning can predict patient response to therapies by analyzing biological markers and datasets.</p>\

<h4>2. Hyperspectral Imaging for Analysis</h4>\
<p>I connected my previous work in spectral data to biomedical applications. Spectral analysis can reveal hidden biochemical properties in tissues and help in disease detection.</p>\

<h4>3. Optimization in Tissue Engineering</h4>\
<p>Using optimization algorithms like genetic algorithms and ant colony optimization, I studied how to improve scaffold design and regeneration efficiency.</p>\

<h3>🧠 Key Insights</h3>\
<ul>\
<li><b>Data is the backbone</b> – AI is essential to interpret complex biological data</li>\
<li><b>Personalization matters</b> – every patient requires unique treatment</li>\
<li><b>System integration</b> – combining AI with hospital systems can transform outcomes</li>\
</ul>\

<h3>🚀 Challenges</h3>\
<ul>\
<li>High treatment costs</li>\
<li>Ethical concerns</li>\
<li>Scalability limitations</li>\
<li>Fragmented data</li>\
</ul>\

<h3>🌍 Future Vision</h3>\
<p>The future of healthcare lies in bioprinting organs, reversing chronic diseases, and building predictive healthcare systems powered by AI.</p>\

<h3>🔗 Connection to My Startup</h3>\
<p>This research directly influences my vision of building a healthcare SaaS platform that integrates predictive analytics, optimizes workflows, and improves patient outcomes.</p>\

<h3>✍️ Final Thoughts</h3>\
<p>The future of healthcare won’t just treat diseases—it will <b>rebuild life itself</b>. And this is just the beginning of my journey.</p>"
}
  
];

const container = document.getElementById("blogContainer");

function loadBlogs(){
  blogs.forEach(blog => {
    const card = document.createElement("div");
    card.classList.add("card");
    card.innerHTML = `<h3>${blog.title}</h3><p>${blog.content}</p>`;
    container.appendChild(card);
  });
}

function openPopup(){
  document.getElementById("popup").classList.add("active");
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

window.onload = loadBlogs;

</script>

</body>
</html>
