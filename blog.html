<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Startup Blog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f172a;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  z-index:1000;
}

header h1{
  color:#22c55e;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:#fff;
}

nav a:hover{
  color:#22c55e;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{
  font-size:3rem;
  margin-bottom:20px;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:#22c55e;
  border:none;
  border-radius:30px;
  color:#000;
  cursor:pointer;
}

/* BLOGS */
.blogs{
  padding:100px 50px;
}

.blog-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card p{
  opacity:0.7;
  margin:10px 0;
}

/* POPUPS */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  transition:0.3s;
  width:90%;
  max-width:600px;
  max-height:80vh;
  overflow-y:auto;
}

.popup.active{
  transform:translate(-50%,-50%) scale(1);
}

/* BLOG CONTENT STYLING */
#blogContent h2{margin-bottom:10px;}
#blogContent h3{margin-top:15px;color:#22c55e;}
#blogContent p{opacity:0.85;line-height:1.6;}
#blogContent ul{padding-left:20px;margin:10px 0;}

footer{
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <h1>MyStartup</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#blogs">Blogs</a>
  </nav>
</header>

<section class="hero">
  <h2>Building the Future 🚀</h2>
  <p>Follow my startup journey</p>
  <button class="btn" onclick="openSubscribe()">Subscribe</button>
</section>

<section class="blogs" id="blogs">
  <h2>Latest Blogs</h2>
  <div class="blog-container" id="blogContainer"></div>
</section>

<!-- Subscribe Popup -->
<div class="popup" id="subscribePopup">
  <h3>Subscribe</h3>
  <input type="email" placeholder="Enter email" style="padding:10px;width:100%;margin:10px 0;border-radius:10px;border:none;">
  <button class="btn" onclick="closeSubscribe()">Close</button>
</div>

<!-- Blog Popup -->
<div class="popup" id="blogPopup">
  <div id="blogContent"></div>
  <button class="btn" onclick="closeBlog()">Close</button>
</div>

<footer>
  <p>© 2026 MyStartup</p>
</footer>

<script>

const blogs = [
{
  title: "My Research Journey in Regenerative Medicine",
  preview: "Exploring how AI, stem cells, hyperspectral imaging, and data science are shaping the future of healing...",
  content: `
  <h2>🧬 My Journey into Regenerative Medicine</h2>

  <p>Regenerative medicine isn’t just another research field—it represents a fundamental shift in how we approach healthcare. Instead of managing symptoms or slowing disease progression, the focus is on <b>restoring, replacing, or regenerating damaged tissues and organs</b>.</p>

  <p>This idea of “healing by rebuilding” is what drew me into this domain, especially from a data science perspective.</p>

  <h3>🌱 What is Regenerative Medicine?</h3>
  <p>Regenerative medicine combines biology, engineering, and computational intelligence to repair or recreate human tissues.</p>

  <ul>
    <li><b>Stem Cell Therapy</b> – using undifferentiated cells to regenerate damaged tissues</li>
    <li><b>Tissue Engineering</b> – building biological structures using scaffolds and biomaterials</li>
    <li><b>Gene Editing</b> – modifying genetic material to correct abnormalities</li>
  </ul>

  <p>What makes this field powerful is its interdisciplinary nature—it sits at the intersection of medicine, AI, and systems engineering.</p>

  <h3>🔬 My Research Focus</h3>

  <h4>1. Predicting Tissue Regeneration Outcomes</h4>
  <p>I explored how machine learning models can be used to predict patient responses to regenerative therapies. By analyzing biological markers and historical datasets, we can estimate:</p>
  <ul>
    <li>Recovery probability</li>
    <li>Treatment effectiveness</li>
    <li>Optimal therapy pathways</li>
  </ul>

  <p>This introduces a shift toward <b>predictive and personalized healthcare</b>.</p>

  <h4>2. Hyperspectral Imaging for Biomedical Analysis</h4>
  <p>One of the most interesting parts of my research was connecting my previous work in hyperspectral data (soil analysis) to biomedical applications.</p>

  <p>Hyperspectral imaging captures detailed spectral information that can reveal hidden biochemical properties. In a medical context, this can be used for:</p>
  <ul>
    <li>Tissue composition analysis</li>
    <li>Early disease detection</li>
    <li>Monitoring regeneration at a cellular level</li>
  </ul>

  <p>This showed me how solutions from one domain can unlock innovation in another.</p>

  <h4>3. Optimization in Tissue Engineering</h4>
  <p>I also explored how optimization algorithms can improve tissue engineering processes.</p>

  <ul>
    <li>Genetic Algorithms for scaffold design</li>
    <li>Ant Colony Optimization for nutrient flow efficiency</li>
    <li>Simulation models for improving regeneration success</li>
  </ul>

  <p>This is where computational intelligence directly contributes to biological outcomes.</p>

  <h3>🧠 Key Insights</h3>

  <ul>
    <li><b>Data is the backbone</b> – regenerative medicine generates complex biological data that requires AI for interpretation</li>
    <li><b>Personalization is critical</b> – every patient responds differently, making one-size-fits-all treatment ineffective</li>
    <li><b>Integration is the future</b> – combining AI with healthcare systems can significantly improve outcomes</li>
  </ul>

  <h3>🚀 Challenges in the Field</h3>

  <ul>
    <li>High cost of regenerative treatments</li>
    <li>Ethical concerns, especially around stem cell usage</li>
    <li>Scalability limitations in clinical environments</li>
    <li>Fragmented and limited biomedical datasets</li>
  </ul>

  <p>These are not just scientific challenges—they are system-level problems that require technological solutions.</p>

  <h3>🌍 Future Vision</h3>

  <p>The future of healthcare is moving toward:</p>

  <ul>
    <li>Bioprinting functional organs</li>
    <li>Reversing chronic diseases instead of managing them</li>
    <li>AI-driven predictive healthcare systems</li>
  </ul>

  <p>We are transitioning from:</p>
  <p><b>Reactive → Predictive → Regenerative healthcare</b></p>

  <h3>🔗 Connection to My Startup</h3>

  <p>This research strongly influences my vision of building a healthcare SaaS platform.</p>

  <p>My goal is to integrate:</p>
  <ul>
    <li>Predictive analytics for patient outcomes</li>
    <li>Smart hospital resource management</li>
    <li>AI-driven treatment recommendations</li>
  </ul>

  <p>Ultimately, I aim to build systems that don’t just manage hospital operations—but actively contribute to improving patient health outcomes.</p>

  <h3>✍️ Final Thoughts</h3>

  <p>Regenerative medicine is still evolving, but its potential is undeniable.</p>

  <p><b>The future of healthcare won’t just treat diseases—it will rebuild life itself.</b></p>

  <p>And this is just the beginning of my journey in exploring that future.</p>
  `
}

];

const container = document.getElementById("blogContainer");

function loadBlogs(){
  blogs.forEach((blog, index) => {
    const card = document.createElement("div");
    card.classList.add("card");
    card.innerHTML = `
      <h3>${blog.title}</h3>
      <p>${blog.preview}</p>
      <button class="btn" onclick="openBlog(${index})">Read More</button>
    `;
    container.appendChild(card);
  });
}

function openBlog(index){
  document.getElementById("blogContent").innerHTML = blogs[index].content;
  document.getElementById("blogPopup").classList.add("active");
}

function closeBlog(){
  document.getElementById("blogPopup").classList.remove("active");
}

function openSubscribe(){
  document.getElementById("subscribePopup").classList.add("active");
}

function closeSubscribe(){
  document.getElementById("subscribePopup").classList.remove("active");
}

window.onload = loadBlogs;

</script>

</body>
</html>
